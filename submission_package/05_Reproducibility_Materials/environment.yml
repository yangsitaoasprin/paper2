name: cyp450
channels:
  - conda-forge
dependencies:
  - python=3.13.14
  - numpy=2.3.5
  - pandas=3.0.3
  - matplotlib=3.10.6
  - pillow=12.0.0
  - kiwisolver=1.4.9
  - fonttools=4.60.1
  - scikit-learn=1.9.0
  - rdkit=2026.03.3
  - pip
  - pip:
      - torch==2.11.0

